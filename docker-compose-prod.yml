services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    container_name: happyeat-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me}
      POSTGRES_DB: ${DB_NAME:-happyeat}
      POSTGRES_INITDB_ARGS: "-E UTF8"
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - postgres_backup:/backup
    ports:
      - "5432:5432"
    networks:
      - happyeat-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-happyeat}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      # 相对路径挂载：数据会存在当前目录下的 data/postgres 文件夹
      - ./data/postgres:/var/lib/postgresql/data
      - ./data/backup:/backup

  happyeat-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: happyeat-api:${APP_IMAGE_TAG:-latest}
    container_name: happyeat-api
    command: ["./main", "-f", "/run/config/happyeatservice.remote.yaml"]
    ports:
      - "${API_PORT:-8888}:8888"
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      # 2. 将宿主机的 etc 目录挂载到容器的 /run/config
      - ./app/etc:/run/config:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - happyeat-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8888/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:

networks:
  happyeat-network:
    driver: bridge
