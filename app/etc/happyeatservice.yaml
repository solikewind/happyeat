Name: HappyEatService
Host: 0.0.0.0
Port: 8888

Auth:
  AccessSecret: "local-dev-secret-change-me"
  AccessExpire: 86400

SqlConfig:
  DataSource: "postgres://postgres:123456@127.0.0.1:5432/happyeat?sslmode=disable"

casbin:
  model: "[request_definition]\nr = sub, obj, act\n[policy_definition]\np = sub, obj, act\n[role_definition]\ng = _, _\n[policy_effect]\ne = some(where (p.eft == allow))\n[matchers]\nm = g(r.sub, p.sub) && r.obj == p.obj && r.act == p.act"

llm:
  APIKey: ""
  BaseURL: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  Model: "qwen-plus"

asr:
  APIKey: ""
  BaseURL: "https://dashscope.aliyuncs.com/api/v1"
  Model: "paraformer-realtime-v2"
  TranscribePath: "/asr/transcribe"
  HotwordCreatePath: "/asr/hotwords"
